# Netlify configuration — עוגן landing page
# This folder is the site root (static, no build step).

[build]
  publish = "."
  command = ""

# Security headers + sane caching.
# HTML/CSS/JS always revalidate (ETag) so edits show up immediately — important
# since filenames aren't content-hashed and the site is edited often (incl. via CMS).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"

# Photos/logos change rarely — cache for a day.
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
